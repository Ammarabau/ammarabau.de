<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammara Bau - Premium Renovierung & Bodenlegung</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js for interactive state switching & calculator -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Font Awesome for clean handcraft icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Playfair Display (Serif), Montserrat (Sans), Inter (Body), Space Grotesk (Tech) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Custom Transition for smooth theme switching */
        .theme-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom brand color matching the image_c2d8c4.png background */
        :root {
            --ammara-slate: #5a5766;
            --ammara-slate-dark: #413e4b;
            --ammara-slate-light: #7b7887;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ammara: {
                            slate: '#5a5766',
                            dark: '#413e4b',
                            light: '#7b7887',
                            gold: '#c5a880',
                            goldHover: '#b0926a',
                            copper: '#e07a5f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="{ 
    activeDesign: 1, 
    area: 50, 
    service: 'boden', 
    quality: 'premium',
    contactName: '',
    contactEmail: '',
    contactSubmitted: false,
    
    // Interactive pricing calculator
    calculateEstimate() {
        let basePrice = 0;
        if (this.service === 'boden') {
            basePrice = this.quality === 'standard' ? 35 : this.quality === 'premium' ? 65 : 110;
        } else if (this.service === 'renovierung') {
            basePrice = this.quality === 'standard' ? 45 : this.quality === 'premium' ? 85 : 145;
        } else {
            basePrice = this.quality === 'standard' ? 75 : this.quality === 'premium' ? 140 : 240;
        }
        return this.area * basePrice;
    }
}" 
class="antialiased theme-transition"
:class="{
    'bg-[#5a5766] text-white font-sans': activeDesign === 1,
    'bg-slate-50 text-slate-800 font-sans': activeDesign === 2,
    'bg-[#121214] text-gray-100 font-sans': activeDesign === 3
}">
